name: Build Qt project

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'src/**'
      - '.github/workflows/build-qt.yml'

  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'src/**'
      - '.github/workflows/build-qt.yml'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows qmake project
    runs-on: windows-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: 'true'

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Show tools
        shell: cmd
        run: |
          qmake -v
          where qmake
          where nmake
          where dumpbin
          where windeployqt

      - name: Find .pro file
        shell: pwsh
        run: |
          $proFiles = Get-ChildItem -Path "src" -Filter "*.pro" -Recurse

          if ($proFiles.Count -eq 0) {
            throw "No .pro file found inside src/"
          }

          if ($proFiles.Count -gt 1) {
            Write-Host "Found several .pro files:"
            $proFiles | ForEach-Object { Write-Host $_.FullName }
            throw "Expected exactly one main .pro file inside src/."
          }

          $proFile = $proFiles[0].FullName
          Write-Host "Using .pro file: $proFile"

          "PRO_FILE=$proFile" >> $env:GITHUB_ENV

      - name: Build Release with qmake
        shell: cmd
        run: |
          mkdir build
          cd build
          qmake "%PRO_FILE%" CONFIG+=release
          nmake

      - name: Find exe and prepare package
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path "build" -Filter "*.exe" -Recurse

          if ($exeFiles.Count -eq 0) {
            throw "No .exe file found after build."
          }

          Write-Host "Found exe files:"
          $exeFiles | ForEach-Object { Write-Host $_.FullName }

          $exe = $exeFiles[0]

          New-Item -ItemType Directory -Force -Path "package" | Out-Null
          Copy-Item $exe.FullName -Destination "package"

          "APP_EXE=$($exe.Name)" >> $env:GITHUB_ENV

          Write-Host "Selected exe: $($exe.FullName)"
          Write-Host "Exe name: $($exe.Name)"

      - name: Deploy Qt dependencies if needed
        shell: pwsh
        run: |
          $exePath = "package/${env:APP_EXE}"

          if (!(Test-Path $exePath)) {
            throw "Executable not found: $exePath"
          }

          Write-Host "Checking dependencies for $exePath"

          $dependencies = & dumpbin /dependents $exePath

          Write-Host "Dependencies:"
          $dependencies | ForEach-Object { Write-Host $_ }

          if ($dependencies -match "Qt6" -or $dependencies -match "Qt5") {
            Write-Host "Qt dependencies found. Running windeployqt..."

            Push-Location package
            windeployqt --release "${env:APP_EXE}"
            Pop-Location
          }
          else {
            Write-Host "No Qt dependencies found. Skipping windeployqt."
            Write-Host "This is normal for a pure C console application built with qmake."
          }

      - name: Create zip package
        shell: pwsh
        run: |
          $branchName = "${{ github.ref_name }}"
          $zipName = "qt-app-windows-$branchName.zip"

          Compress-Archive -Path "package/*" -DestinationPath $zipName -Force

          "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

          Write-Host "Created package: $zipName"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: qt-app-windows-${{ github.ref_name }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 14

      - name: Publish develop latest prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        shell: pwsh
        run: |
          Write-Host "Publishing develop-latest prerelease..."

          gh release delete develop-latest --yes --cleanup-tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous develop-latest release found or delete failed. Continuing..."
          }

          gh release create develop-latest `
            "$env:ZIP_NAME" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "Develop latest build" `
            --notes "Автоматическая сборка из ветки develop. Commit: $env:GITHUB_SHA" `
            --prerelease

      - name: Publish main latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          Write-Host "Publishing main-latest release..."

          gh release delete main-latest --yes --cleanup-tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous main-latest release found or delete failed. Continuing..."
          }

          gh release create main-latest `
            "$env:ZIP_NAME" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "Main latest build" `
            --notes "Автоматическая сборка из ветки main. Commit: $env:GITHUB_SHA"
